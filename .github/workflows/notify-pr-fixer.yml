name: Notify PR Fixer

on:
  pull_request_review:
    types: [submitted]

# Only one fixer dispatch per PR at a time — cancel stale runs
concurrency:
  group: pr-fixer-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  notify-fixer:
    # Fire only for CodeRabbit reviews on non-draft PRs that haven't already failed auto-fix
    if: |
      github.event.review.user.login == 'coderabbitai[bot]' &&
      github.event.pull_request.draft == false &&
      !contains(toJSON(github.event.pull_request.labels.*.name), 'Auto-fix failed')
    runs-on: ubuntu-latest
    steps:
      # Convert to draft BEFORE dispatching — suppresses CodeRabbit cloud
      # reviews on fix commits, preventing the feedback loop
      - name: Convert PR to draft
        env:
          GH_TOKEN: ${{ secrets.QA_HUB_DISPATCH_TOKEN }}
        run: |
          PR_NODE_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $number) { id }
              }
            }' \
            -f owner="${{ github.repository_owner }}" \
            -f repo="${{ github.event.repository.name }}" \
            -F number=${{ github.event.pull_request.number }} \
            --jq '.data.repository.pullRequest.id')

          gh api graphql -f query='
            mutation($id: ID!) {
              convertPullRequestToDraft(input: {pullRequestId: $id}) {
                pullRequest { isDraft }
              }
            }' -f id="$PR_NODE_ID"
          echo "PR #${{ github.event.pull_request.number }} converted to draft"

      - name: Trigger PR Fixer
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.QA_HUB_DISPATCH_TOKEN }}
          repository: wherk-coder/qa-hub
          event-type: coderabbit-review
          client-payload: >-
            {
              "repo": "${{ github.repository }}",
              "pr_number": "${{ github.event.pull_request.number }}",
              "review_author": "${{ github.event.review.user.login }}",
              "pr_branch": "${{ github.event.pull_request.head.ref }}"
            }
